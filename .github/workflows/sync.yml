name: Sync GitLab Contributions to GitHub

on:
  schedule:
    - cron: '0 23 * * *' # Runs every day at 11 PM UTC
  workflow_dispatch: # Allows you to run it manually

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required by the action to maintain commit history

      - name: Run GitLab Activity Sync
        uses: gowee/sync-contrib-calendar-action@v0.1-alpha # Active community action
        with:
          source: 'gitlab'
          # gitlab
          gitlab_endpoint: 'http://102.223.8.140:9000' 
          
          username: 'Jumaa_Omary' 
          # Access token secret from Step 4
          access_token: ${{ secrets.GITLAB_TOKEN }} 
