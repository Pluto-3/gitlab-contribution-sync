name: Sync GitLab Contributions to GitHub

on:
  schedule:
    - cron: '0 23 * * *' # Runs daily at 11 PM UTC
  workflow_dispatch: # Allows you to run it manually

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch GitLab Activity and Create Commits
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_URL: 'http://102.223.8.140:9000'
          GITLAB_USER: 'Jumaa_Omary'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GH_EMAIL="jumaa.gunda101@gmail.com"
          GH_NAME="Pluto-3"
          echo "Using GitHub identity: $GH_NAME <$GH_EMAIL>"

          # Paginate through ALL GitLab events (max 100 per page)
          ALL_EVENTS="[]"
          PAGE=1
          while true; do
            RESPONSE=$(curl -s --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
              "$GITLAB_URL/api/v4/users/$GITLAB_USER/events?per_page=100&page=$PAGE")

            if ! echo "$RESPONSE" | jq empty 2>/dev/null; then
              echo "Error: GitLab API returned invalid JSON on page $PAGE"
              exit 1
            fi

            COUNT=$(echo "$RESPONSE" | jq 'length')
            echo "Page $PAGE: $COUNT events"
            ALL_EVENTS=$(echo "$ALL_EVENTS $RESPONSE" | jq -s 'add')

            [ "$COUNT" -lt 100 ] && break
            PAGE=$((PAGE + 1))
          done

          TOTAL=$(echo "$ALL_EVENTS" | jq 'length')
          echo "Total events fetched: $TOTAL"

          # Show all action types seen (for debugging)
          echo "Action types found:"
          echo "$ALL_EVENTS" | jq -r '.[].action_name' | sort | uniq -c | sort -rn

          # Extract unique dates from ALL event types (no action filter)
          DATES=$(echo "$ALL_EVENTS" | jq -r '.[].created_at' | cut -d'T' -f1 | sort -u)

          if [ -z "$DATES" ]; then
            echo "No GitLab activity found."
            exit 0
          fi

          echo "Active dates to sync:"
          echo "$DATES"

          git config --local user.email "$GH_EMAIL"
          git config --local user.name "$GH_NAME"

          mkdir -p activity_logs
          PUSHED=0
          for DATE in $DATES; do
            echo "Activity on $DATE" >> "activity_logs/$DATE.log"
            git add "activity_logs/$DATE.log"
            GIT_AUTHOR_DATE="$DATE 12:00:00" GIT_COMMITTER_DATE="$DATE 12:00:00" \
              git commit -m "Synced GitLab contribution for $DATE" && PUSHED=$((PUSHED + 1))
          done

          echo "Committed $PUSHED dates"
          git push origin main
