name: Sync GitLab Contributions to GitHub

on:
  schedule:
    - cron: '0 23 * * *' # Runs daily at 11 PM UTC
  workflow_dispatch: # Allows you to run it manually

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch GitLab Activity and Create Commits
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_URL: 'http://102.223.8.140:9000'
          GITLAB_USER: 'Jumaa_Omary'
        run: |
          GH_EMAIL="jumaa.gunda101@gmail.com"
          GH_NAME="Pluto-3"

          # Paginate through ALL GitLab events
          ALL_EVENTS="[]"
          PAGE=1
          while true; do
            RESPONSE=$(curl -s --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
              "$GITLAB_URL/api/v4/users/$GITLAB_USER/events?per_page=100&page=$PAGE")

            if ! echo "$RESPONSE" | jq empty 2>/dev/null; then
              echo "Error: GitLab API returned invalid JSON on page $PAGE"
              exit 1
            fi

            COUNT=$(echo "$RESPONSE" | jq 'length')
            echo "Page $PAGE: $COUNT events"
            ALL_EVENTS=$(echo "$ALL_EVENTS $RESPONSE" | jq -s 'add')

            [ "$COUNT" -lt 100 ] && break
            PAGE=$((PAGE + 1))
          done

          echo "Total events fetched: $(echo "$ALL_EVENTS" | jq 'length')"
          echo "Action types found:"
          echo "$ALL_EVENTS" | jq -r '.[].action_name' | sort | uniq -c | sort -rn

          # Build date -> contribution count map:
          # push events use commit_count; everything else counts as 1
          DATE_COUNTS=$(echo "$ALL_EVENTS" | jq -r '.[] |
            (.created_at[0:10]) + " " +
            (if .action_name == "pushed to" then (.push_data.commit_count // 1) else 1 end | tostring)
          ' | awk '{sum[$1]+=$2} END {for (d in sum) print d, sum[d]}' | sort)

          if [ -z "$DATE_COUNTS" ]; then
            echo "No GitLab activity found."
            exit 0
          fi

          echo "GitLab contributions per day:"
          echo "$DATE_COUNTS"

          git config --local user.email "$GH_EMAIL"
          git config --local user.name "$GH_NAME"

          COMMITTED=0
          SKIPPED=0
          while IFS=' ' read -r DATE EXPECTED; do
            # Count existing synced commits for this date with the correct email
            EXISTING=$(git log --author="$GH_EMAIL" --format="%s" \
              | grep -c "^Synced GitLab contribution for $DATE$" || true)
            TO_ADD=$((EXPECTED - EXISTING))

            if [ "$TO_ADD" -le 0 ]; then
              echo "Skip $DATE (have $EXISTING/$EXPECTED)"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            echo "Commit $DATE: adding $TO_ADD (have $EXISTING, need $EXPECTED)"
            for i in $(seq 1 $TO_ADD); do
              GIT_AUTHOR_DATE="$DATE 12:00:00" GIT_COMMITTER_DATE="$DATE 12:00:00" \
                git commit --allow-empty -m "Synced GitLab contribution for $DATE"
            done
            COMMITTED=$((COMMITTED + TO_ADD))
          done <<< "$DATE_COUNTS"

          echo "Total committed: $COMMITTED  Days skipped: $SKIPPED"
          git push origin main
