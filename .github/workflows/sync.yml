name: Sync GitLab Contributions to GitHub

on:
  schedule:
    - cron: '0 23 * * *' # Runs daily at 11 PM UTC
  workflow_dispatch: # Allows you to run it manually

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute real per-day contribution counts
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_URL: ${{ secrets.GITLAB_URL }}
          GITLAB_USER: ${{ secrets.GITLAB_USER }}
          GITLAB_AUTHOR_EMAILS: ${{ secrets.GITLAB_AUTHOR_EMAILS }}
        run: python3 scripts/aggregate_contributions.py > /tmp/date_counts.txt

      - name: Create commits from computed counts
        run: |
          GH_EMAIL="jumaa.gunda101@gmail.com"
          GH_NAME="Pluto-3"
          # Hard ceiling regardless of what the aggregator computed: no single
          # day should ever again turn into tens of thousands of commits.
          MAX_ADD_PER_DAY=100

          DATE_COUNTS=$(cat /tmp/date_counts.txt)
          if [ -z "$DATE_COUNTS" ]; then
            echo "No GitLab activity found."
            exit 0
          fi

          echo "GitLab contributions per day:"
          echo "$DATE_COUNTS"

          git config --local user.email "$GH_EMAIL"
          git config --local user.name "$GH_NAME"

          COMMITTED=0
          SKIPPED=0
          while IFS=' ' read -r DATE EXPECTED; do
            [ -z "$DATE" ] && continue
            # Count existing synced commits for this date with the correct email
            EXISTING=$(git log --author="$GH_EMAIL" --format="%s" \
              | grep -c "^Synced GitLab contribution for $DATE$" || true)
            TO_ADD=$((EXPECTED - EXISTING))

            if [ "$TO_ADD" -le 0 ]; then
              echo "Skip $DATE (have $EXISTING/$EXPECTED)"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            if [ "$TO_ADD" -gt "$MAX_ADD_PER_DAY" ]; then
              echo "Warning: $DATE wants to add $TO_ADD, clamping to $MAX_ADD_PER_DAY"
              TO_ADD=$MAX_ADD_PER_DAY
            fi

            echo "Commit $DATE: adding $TO_ADD (have $EXISTING, need $EXPECTED)"
            for i in $(seq 1 $TO_ADD); do
              GIT_AUTHOR_DATE="$DATE 12:00:00" GIT_COMMITTER_DATE="$DATE 12:00:00" \
                git commit --allow-empty -m "Synced GitLab contribution for $DATE"
            done
            COMMITTED=$((COMMITTED + TO_ADD))
          done <<< "$DATE_COUNTS"

          echo "Total committed: $COMMITTED  Days skipped: $SKIPPED"
          git push origin main
