name: Sync GitLab Contributions to GitHub

on:
  schedule:
    - cron: '0 23 * * *' # Runs daily at 11 PM UTC
  workflow_dispatch: # Allows you to run it manually

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch GitLab Activity and Create Commits
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_URL: 'http://102.223.8.140:9000'
          GITLAB_USER: 'Jumaa_Omary'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch GitHub user info (login + noreply email that always matches the account)
          GH_USER=$(curl -s -H "Authorization: token $GH_TOKEN" https://api.github.com/user)
          GH_NAME=$(echo "$GH_USER" | jq -r '.login')
          GH_ID=$(echo "$GH_USER" | jq -r '.id')
          # GitHub's noreply address is always accepted for contribution attribution
          GH_EMAIL="${GH_ID}+${GH_NAME}@users.noreply.github.com"
          echo "Using GitHub identity: $GH_NAME <$GH_EMAIL>"

          # Fetch contribution events from GitLab API
          EVENTS=$(curl -s --header "PRIVATE-TOKEN: $GITLAB_TOKEN" "$GITLAB_URL/api/v4/users/$GITLAB_USER/events?per_page=100")

          if ! echo "$EVENTS" | jq empty 2>/dev/null; then
            echo "Error: Could not connect to GitLab or invalid token."
            exit 1
          fi

          DATES=$(echo "$EVENTS" | jq -r '.[] | select(.action_name == "pushed to" or .action_name == "created") | .created_at' | cut -d'T' -f1 | sort -u)

          if [ -z "$DATES" ]; then
            echo "No recent GitLab activity found to sync."
            exit 0
          fi

          git config --local user.email "$GH_EMAIL"
          git config --local user.name "$GH_NAME"

          mkdir -p activity_logs
          for DATE in $DATES; do
            echo "Activity on $DATE" >> "activity_logs/$DATE.log"
            git add "activity_logs/$DATE.log"
            GIT_AUTHOR_DATE="$DATE 12:00:00" GIT_COMMITTER_DATE="$DATE 12:00:00" \
              git commit -m "Synced GitLab contribution for $DATE"
          done

          git push origin main
